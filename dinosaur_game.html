<!DOCTYPE html>
<html>
<head>
    <title>Dinosaur Game</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- This is the font returned from Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@700&display=swap" rel="stylesheet">

    <style>
    /* Style to make the svg fit in the browser */
    body { padding: 0; margin: 0; }
    svg  { width: 100%; height: auto; }

    /* The container moves the text to the middle of the screen */
    #gameover-container {
        transform: translate(500px, 200px);
        animation: none;
    }
    #gameover {
        display: none;
        font-family: Dosis, sans-serif;
        animation: none;
    }


    @keyframes gameover-bounce {
        0%   { transform: translate(500px, -300px); opacity: 0; }
        55%  { transform: translate(500px, 222px);  opacity: 1; }
        70%  { transform: translate(500px, 174px); }
        82%  { transform: translate(500px, 212px); }
        91%  { transform: translate(500px, 193px); }
        100% { transform: translate(500px, 200px); }
    }

    @keyframes gameover-glow {
        0%   { filter: drop-shadow(0 0  5px #ff2200); }
        50%  { filter: drop-shadow(0 0 22px #ff7700)
                       drop-shadow(0 0  8px #ffee00); }
        100% { filter: drop-shadow(0 0  5px #ff2200); }
    }

    @keyframes gameover-color {
        0%   { fill: #ff1100; }
        33%  { fill: #ff8800; }
        66%  { fill: #ffee00; }
        100% { fill: #ff1100; }
    }

    /*Keyframe for the obstacle animation */
    @keyframes cloud-animation-1 {
        from { transform: translate(1000px, 45px); }
        to { transform: translate(-200px, 45px); }
    }
    @keyframes cloud-animation-2 {
        from { transform: translate(1000px, 70px); }
        to { transform: translate(-200px, 70px); }
    }
    @keyframes cloud-animation-3 {
        from { transform: translate(1000px, 28px); }
        to { transform: translate(-200px, 28px); }
    }

    @keyframes flower-animation {
        from { transform: translateX(1000px) translateY(250px) scale(0.12); }
        to { transform: translateX(-200px) translateY(250px) scale(0.12); }
    }

    @keyframes agnes-jump{
        0%   { transform: translate(50px, 216px) scale(0.15); }
        50%  { transform: translate(50px, 126px) scale(0.15); }
        100% { transform: translate(50px, 216px) scale(0.15); }
    }

    /*Objects */
    .cloud {
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        animation-duration: 8s;
        animation-fill-mode: backwards;
    }


    #flower{
        animation-name: none;
        animation-timing-function: linear;
        animation-iteration-count: 1;
        animation-duration: 4s;
        display: none;
        transform: translate(1000px,250px) scale(0.12);
    }

    #agnes{
        animation-name: none;
        animation-timing-function: linear;
        animation-iteration-count: 1;
        animation-duration: 0.8s;
        transform: translate(50px,220px) scale(0.15);
    }


    </style>
    <script>
    
    let GameOverID;
    // Check whether the game is over if the dinosaur is near the obstacle
    function checkGameover() {
        
        // You need to keep on checking for the gameover situation here
    
        // Read the transform property of the dinosaur and obstacle
        // Extract the appropriate numbers
        const flower_x = parseFloat($("#flower").css("transform").split(",")[4]);
        const agnes_x = parseFloat($("#agnes").css("transform").split(",")[4]);
        const agnes_y = parseFloat($("#agnes").css("transform").split(",")[5]);

        // Compare the numbers for the gameover situation
        if (flower_x < agnes_x + 30 && flower_x > agnes_x - 30 && agnes_y > 160) {
            $("#flower").css("animation-play-state", "paused");
            $("#agnes").css("animation-play-state", "paused");
            $(".cloud").css("animation-play-state", "paused");


            $("#gameover-container").css("animation", "gameover-bounce 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards, gameover-glow 1.5s 0.9s ease-in-out infinite");
            $("#gameover").show().css("animation", "gameover-color 2s 0.9s ease-in-out infinite");

            //make sure all checkgameover calls stop after gameover
            clearTimeout(GameOverID);

            return;
        }


        // Request to check again
        GameOverID = setTimeout(checkGameover, 50);
    }

    // Make an obstacle by starting the obstacle animation
    function makeObstacle() {

        // You need to show the obstacle and start the animation here
        $("#flower").show();
        $("#flower").css("animation-name", "flower-animation");
    }

    // Make the dinosaur jump by starting the dinosaur animation
    function jump() {

        // You need to start the dinosaur jumping animation here
        $("#agnes").css("animation-name", "agnes-jump");

    }

    $(function () {
        // Handle the spacebar key for controlling the dinosaur
        $(document).on("keydown", function(e) {
            // The dinosaur jumps if the spacebar key is down
            if (e.keyCode == 32)
                jump();
        });

        // The obstacle animation has finished
        $("#flower").on("animationend", function() {

            // You need to hide the obstacle and stop the animation here
            $("#flower").hide();
            $("#flower").css("animation-name", "none");
            // You will make another obstacle later
            let current_duration = parseFloat($("#flower").css("animation-duration"));
            current_duration = Math.max(1, current_duration - 0.2);
            $("#flower").css("animation-duration", current_duration + "s");
            setTimeout(makeObstacle, Math.random() * 2000);
        });

        // The dinosaur animation has finished
        $("#agnes").on("animationend", function() {

            // You need to stop the animation here
            $("#agnes").css("animation-name", "none");
        });

        // Start the obstacle animation
        setTimeout(makeObstacle, Math.random() * 2000);

        // Start the game over checking
        setTimeout(checkGameover, 50);
    });
    </script>
</head>
